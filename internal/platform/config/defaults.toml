# AI Workflow 默认配置

[run]
default_template = "standard"
global_timeout = "2h"
auto_infer_template = true
max_total_retries = 5

[scheduler]
max_global_agents = 3
max_project_runs = 2

  [scheduler.watchdog]
  enabled = true
  interval = "5m"
  stuck_run_ttl = "30m"
  stuck_merge_ttl = "15m"
  queue_stale_ttl = "60m"

[runtime.collector]
max_retries = 2

[runtime.llm]
default_config_id = "openai-response-default"

  [[runtime.llm.configs]]
  id = "openai-chat-default"
  type = "openai_chat_completion"
  base_url = "https://api.openai.com/v1"
  api_key = ""
  model = "gpt-4.1-mini"
  temperature = 0

  [[runtime.llm.configs]]
  id = "openai-response-default"
  type = "openai_response"
  base_url = "https://api.openai.com/v1"
  api_key = ""
  model = "gpt-4.1-mini"
  temperature = 0

  [[runtime.llm.configs]]
  id = "anthropic-default"
  type = "anthropic"
  base_url = "https://api.anthropic.com"
  api_key = ""
  model = "claude-3-7-sonnet-latest"
  temperature = 0
  max_output_tokens = 4096

[runtime.sandbox]
enabled = false
provider = "home_dir"

  [runtime.sandbox.gc]
  archive_cleanup = true
  startup_cleanup = true
  interval = "6h"
  repo_max_age = "168h"

  [runtime.sandbox.litebox]
  bridge_command = "litebox-acp"
  bridge_args = []
  runner_path = ""
  runner_args = []

  [runtime.sandbox.docker]
  command = "docker"
  image = ""
  run_args = []
  cpus = ""
  memory = ""
  memory_swap = ""
  pids_limit = ""
  network = ""
  read_only_rootfs = false
  tmpfs = []

[runtime.run_probe]
enabled = false
interval = "1m"
after = "20m"
idle_after = "10m"
timeout = "45s"
max_attempts = 1

[runtime.cron]
enabled = false
interval = "1m"

[runtime.prompts]
thread_shared_boot_template = """
你正在参与一个多 agent 协作 Thread。

协作建议：

1. 只要 thread runtime 已经把消息路由给你，就把它视为当前交到你手上的一棒并直接执行。路由来源可能是明确 @你、用户手动选择你、broadcast 或 auto 匹配；不要因为消息文本里没有 @你 就把任务退回去。
2. 如果你没有收到本轮消息投递，先不要抢答，让当前接棒者继续推进。
3. 你在不同轮次里可能负责执行、等待、汇总或协调。当前职责由 thread 上下文决定，不要预设固定角色。
4. 当你接到任务时，优先交付你这一段能确认的结果；不要试图一条消息包办所有人的工作。
5. 如果你被要求“等 A、B 完成后再继续”，就记住这个条件。之后每次再次收到 thread 投递时，都重新检查上下文：
   - 条件未满足：只简短说明你还在等谁
   - 条件满足：立即继续执行下一步
6. 如果你需要别人先补结果，明确写出“我在等谁/等什么，收到后我会继续做什么”。
7. 如果你完成了自己的部分，要明确说“我这部分已完成”。如果你判断下一棒适合谁接，直接说明；如果用户或上游要求你通知下游，就显式 @下游。
8. 如果你被要求在他人完成后做汇总，就先确认依赖是否都满足；未满足时先更新进度和缺口，满足后再给用户清晰结论。
9. 对自然语言派发，优先根据上下文理解当前接力关系；如果角色边界不完全明确，也先给出你能推进的部分、当前阻塞和建议下一步，而不是只回复“这不是我的任务”。
10. 如果状态不确定，不要擅自判断别人已经完成。宁可明确说还不确定，也不要误判。

目标：配合、接力、少歧义，让 thread 可以靠自然语言和 @mention 自然流转。
"""

rework_followup = """
# Rework Requested

上一轮提交未通过 gate，请根据反馈继续修改并在本地跑必要测试（不要只做 smoke）。

反馈：
{{.Feedback}}

请回复：你改了什么、怎么验证的、以及是否需要进一步协助。
"""

continue_followup = """
# Continue

请继续完成本 action（复用已有上下文，不要重复粘贴大段背景）：{{.StepName}}
"""

pr_implement_objective = """
进行实现并在当前 worktree 中完成必要验证。必须直接修改代码/README，并执行与改动相关的实际检查（不要只做 smoke）。
不要自行 git commit/push；后续步骤会处理。
若 gate 或 merge 打回，请继续在当前分支修复，并在最终回复中明确列出你实际执行过的检查命令、结果，以及是否还存在阻塞。
"""

pr_gate_objective = """
你是代码审查员。你会收到上游 implement / commit / PR action 的输出。请综合 worktree 当前状态与上游输出评审本次提交是否可合并。
至少检查：1) 改动是否满足目标；2) implement 输出里是否明确给出实际执行过的验证命令与结果；3) 当前分支是否存在明显冲突或阻塞。
若不通过，必须给出可执行的返工原因；若通过，系统会自动尝试 merge，merge 失败时你的反馈会回流给上游继续修复。
最后必须输出一行：AI_WORKFLOW_GATE_JSON: {"verdict":"pass|reject","reason":"..."}
"""

pr_merge_rework_feedback = """
自动合并失败。{{if .PRNumber}}PR #{{.PRNumber}}{{if .PRURL}}（{{.PRURL}}）{{end}} 当前未能合并。{{end}}{{if .MergeableState}} mergeable_state={{.MergeableState}}。{{end}}
{{.Hint}}
不要新开 PR；继续在当前分支修复，并保留实际执行过的检查命令与结果。
"""

  [runtime.prompts.pr_providers.github]
  merge_rework_feedback = ""
    [runtime.prompts.pr_providers.github.merge_states]
    default = ""
    dirty = ""
    blocked = ""
    behind = ""
    unstable = ""
    draft = ""

  [runtime.prompts.pr_providers.codeup]
  merge_rework_feedback = ""
    [runtime.prompts.pr_providers.codeup.merge_states]
    default = ""
    dirty = ""
    blocked = ""
    behind = ""
    unstable = ""
    draft = ""

  [runtime.prompts.pr_providers.gitlab]
  merge_rework_feedback = ""
    [runtime.prompts.pr_providers.gitlab.merge_states]
    default = ""
    dirty = ""
    blocked = ""
    behind = ""
    unstable = ""
    draft = ""

[[runtime.agents.drivers]]
id = "claude-acp"
launch_command = "npx"
launch_args = ["-y", "@zed-industries/claude-agent-acp"]
  [runtime.agents.drivers.capabilities_max]
  fs_read = true
  fs_write = true
  terminal = true

[[runtime.agents.drivers]]
id = "codex-acp"
launch_command = "npx"
launch_args = ["-y", "@zed-industries/codex-acp"]
  [runtime.agents.drivers.capabilities_max]
  fs_read = true
  fs_write = true
  terminal = true

[[runtime.agents.drivers]]
id = "agentsdk-go"
launch_command = "agentsdk-go"
  [runtime.agents.drivers.capabilities_max]
  fs_read = true
  fs_write = true
  terminal = true

[[runtime.agents.profiles]]
id = "ceo"
name = "CEO Orchestrator"
driver = "claude-acp"
llm_config_id = "system"
role = "lead"
capabilities = ["planning", "coordination", "review"]
skills = ["ceo-manage", "plan-actions", "sys-action-manage"]
actions_allowed = ["read_context", "search_files", "fs_write", "terminal", "create_step", "expand_flow", "submit"]
prompt_template = "ceo_orchestrator"
  [runtime.agents.profiles.session]
  reuse = true
  max_turns = 40
  idle_ttl = "20m"
  [runtime.agents.profiles.mcp]
  enabled = true

[[runtime.agents.profiles]]
id = "lead"
name = "Lead Agent"
driver = "claude-acp"
llm_config_id = "system"
role = "lead"
capabilities = ["planning", "review", "fullstack"]
skills = ["plan-actions", "sys-action-manage"]
actions_allowed = ["read_context", "search_files", "fs_write", "terminal", "create_step", "expand_flow", "submit"]
prompt_template = "team_leader"
  [runtime.agents.profiles.session]
  reuse = true
  max_turns = 50
  idle_ttl = "30m"
  [runtime.agents.profiles.mcp]
  enabled = true

[[runtime.agents.profiles]]
id = "worker"
name = "Worker (AgentSDK)"
driver = "agentsdk-go"
llm_config_id = "system"
role = "worker"
capabilities = ["backend", "frontend", "test"]
actions_allowed = ["read_context", "search_files", "fs_write", "terminal", "submit"]
prompt_template = "implement"
  [runtime.agents.profiles.session]
  reuse = true
  max_turns = 24
  idle_ttl = "15m"

[[runtime.agents.profiles]]
id = "reviewer"
name = "Reviewer (AgentSDK)"
driver = "agentsdk-go"
llm_config_id = "system"
role = "gate"
capabilities = ["review"]
actions_allowed = ["read_context", "search_files", "approve", "reject", "submit"]
prompt_template = "review"
  [runtime.agents.profiles.session]
  reuse = true
  max_turns = 16
  idle_ttl = "15m"

[[runtime.agents.profiles]]
id = "support"
name = "Support (AgentSDK)"
driver = "agentsdk-go"
llm_config_id = "system"
role = "support"
capabilities = ["planning", "analysis"]
actions_allowed = ["read_context", "search_files", "submit"]
prompt_template = "plan_parser"
  [runtime.agents.profiles.session]
  reuse = true
  max_turns = 12
  idle_ttl = "10m"

[server]
host = "127.0.0.1"
port = 8080
# allowed_origins = ["https://your-domain.com"]  # CORS whitelist; empty = allow all (unsafe for production)

[github]
enabled = false

[store]
driver = "sqlite"
path = ".ai-workflow/data.db"

[log]
level = "info"
file = ".ai-workflow/logs/app.log"
max_size_mb = 100
max_age_days = 30

[audit]
enabled = true
fallback_dir = "audit/tool-calls"
retention_days = 30
redaction_level = "basic"

  [audit.otlp]
  enabled = false
  endpoint = ""
  headers = {}
