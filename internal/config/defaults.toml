# ─── Team Leader ─────────────────────────────────────────────────
[team_leader]
review_gate_plugin = "review-ai-panel"
  [team_leader.review_orchestrator]
  max_rounds = 2
  [team_leader.dag_scheduler]
  max_concurrent_tasks = 2

# ─── A2A ─────────────────────────────────────────────────────────
[a2a]
enabled = true
token   = ""
version = "0.3"

# ─── Server ──────────────────────────────────────────────────────
# Auth token 统一由 secrets.yaml 管理，所有端点强制认证。
[server]
host = "127.0.0.1"
port = 8080

# ─── GitHub ──────────────────────────────────────────────────────
[github]
enabled = false

# ─── Store ───────────────────────────────────────────────────────
[store]
driver = "sqlite"
path   = ".ai-workflow/data.db"

# ─── LLM Filter (reserved for future use) ────────────────────────
# [llm_filter]
# enabled  = false
# provider = ""   # anthropic / openai / local
# model    = ""

# ─── Log ─────────────────────────────────────────────────────────
[log]
level        = "info"
file         = ".ai-workflow/logs/app.log"
max_size_mb  = 100
max_age_days = 30
