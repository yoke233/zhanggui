# AI Workflow — 默认配置（单一数据源）
# 此文件嵌入到二进制中，用户未创建 config.toml 时自动使用。

# ─── Agent Profiles ───────────────────────────────────────────────
[agents]

  [[agents.profiles]]
  name            = "claude"
  launch_command  = "npx"
  launch_args     = ["-y", "@zed-industries/claude-agent-acp"]
  [agents.profiles.env]
  [agents.profiles.capabilities_max]
  fs_read  = true
  fs_write = true
  terminal = true

  [[agents.profiles]]
  name            = "codex"
  launch_command  = "npx"
  launch_args     = ["-y", "@zed-industries/codex-acp"]
  [agents.profiles.env]
  [agents.profiles.capabilities_max]
  fs_read  = true
  fs_write = true
  terminal = true

# ─── Roles ────────────────────────────────────────────────────────
[[roles]]
name             = "team_leader"
agent            = "claude"
prompt_template  = "team_leader"
  [roles.capabilities]
  fs_read  = true
  fs_write = true
  terminal = true
  [roles.session]
  reuse              = true
  prefer_load_session = true
  [roles.mcp]
  enabled = true

[[roles]]
name             = "worker"
agent            = "codex"
prompt_template  = "implement"
  [roles.capabilities]
  fs_read  = true
  fs_write = true
  terminal = true
  [roles.session]
  reuse = true

[[roles]]
name             = "reviewer"
agent            = "claude"
prompt_template  = "review"
  [roles.capabilities]
  fs_read  = true
  fs_write = false
  terminal = false
  [roles.session]
  reuse        = true
  reset_prompt = true

[[roles]]
name             = "aggregator"
agent            = "claude"
prompt_template  = "review_aggregator"
  [roles.capabilities]
  fs_read  = true
  fs_write = false
  terminal = false
  [roles.session]
  reuse        = true
  reset_prompt = true

[[roles]]
name             = "plan_parser"
agent            = "claude"
prompt_template  = "plan_parser"
  [roles.capabilities]
  fs_read  = true
  fs_write = false
  terminal = false

# ─── Role Bindings ────────────────────────────────────────────────
[role_bindings.team_leader]
role = "team_leader"

[role_bindings.run.stage_roles]
requirements = "worker"
implement    = "worker"
review       = "reviewer"
fixup        = "worker"
test         = "worker"

[role_bindings.review_orchestrator]
aggregator = "aggregator"
  [role_bindings.review_orchestrator.reviewers]
  completeness = "reviewer"
  dependency   = "reviewer"
  feasibility  = "reviewer"

[role_bindings.plan_parser]
role = "plan_parser"

# ─── Run ──────────────────────────────────────────────────────────
[run]
default_template   = "standard"
global_timeout     = "2h"
auto_infer_template = true
max_total_retries  = 5

# ─── Scheduler ───────────────────────────────────────────────────
[scheduler]
max_global_agents = 3
max_project_runs  = 2

  [scheduler.watchdog]
  enabled         = true
  interval        = "5m"
  stuck_run_ttl   = "30m"
  stuck_merge_ttl = "15m"
  queue_stale_ttl = "60m"

# ─── V2 Engine ────────────────────────────────────────────────────
# v2 引擎的元数据抽取（Collector）默认关闭：需要提供 OpenAI 配置后才会启用。
[v2.collector]
max_retries = 2

  [v2.collector.openai]
  # 例如: "https://api.openai.com/v1"；留空则使用 SDK 默认值。
  base_url = "https://api.openai.com/v1"
  # 注意：不建议把密钥提交到版本库。
  api_key  = "xxxxxxxxxxxx"
  # 例如: "gpt-4o-mini"
  model    = "deepseek-v3.2"

# ─── V2 Agent Drivers & Profiles ─────────────────────────────────
# Driver = 进程启动配置（共享二进制）
# Profile = 角色实例（绑定 driver + 能力 + 动作白名单）
#
# 如果 v2.agents 为空，v2 引擎会自动从 v1 的 agents.profiles + roles 推导。

