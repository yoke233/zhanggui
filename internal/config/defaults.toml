# AI Workflow — 默认配置（单一数据源）
# 此文件嵌入到二进制中，用户未创建 config.toml 时自动使用。

# ─── Agent Profiles ───────────────────────────────────────────────
[agents]

  [[agents.profiles]]
  name            = "claude"
  launch_command  = "npx"
  launch_args     = ["-y", "@zed-industries/claude-agent-acp"]
  [agents.profiles.env]
  [agents.profiles.capabilities_max]
  fs_read  = true
  fs_write = true
  terminal = true

  [[agents.profiles]]
  name            = "codex"
  launch_command  = "npx"
  launch_args     = ["-y", "@zed-industries/codex-acp"]
  [agents.profiles.env]
  [agents.profiles.capabilities_max]
  fs_read  = true
  fs_write = true
  terminal = true

# ─── Roles ────────────────────────────────────────────────────────
[[roles]]
name             = "team_leader"
agent            = "claude"
prompt_template  = "team_leader"
  [roles.capabilities]
  fs_read  = true
  fs_write = true
  terminal = true
  [roles.session]
  reuse              = true
  prefer_load_session = true
  [roles.mcp]
  enabled = true

[[roles]]
name             = "worker"
agent            = "codex"
prompt_template  = "implement"
  [roles.capabilities]
  fs_read  = true
  fs_write = true
  terminal = true
  [roles.session]
  reuse = true

[[roles]]
name             = "reviewer"
agent            = "claude"
prompt_template  = "review"
  [roles.capabilities]
  fs_read  = true
  fs_write = false
  terminal = false
  [roles.session]
  reuse        = true
  reset_prompt = true

[[roles]]
name             = "aggregator"
agent            = "claude"
prompt_template  = "review_aggregator"
  [roles.capabilities]
  fs_read  = true
  fs_write = false
  terminal = false
  [roles.session]
  reuse        = true
  reset_prompt = true

[[roles]]
name             = "plan_parser"
agent            = "claude"
prompt_template  = "plan_parser"
  [roles.capabilities]
  fs_read  = true
  fs_write = false
  terminal = false

# ─── Role Bindings ────────────────────────────────────────────────
[role_bindings.team_leader]
role = "team_leader"

[role_bindings.run.stage_roles]
requirements = "worker"
implement    = "worker"
review       = "reviewer"
fixup        = "worker"
test         = "worker"

[role_bindings.review_orchestrator]
aggregator = "aggregator"
  [role_bindings.review_orchestrator.reviewers]
  completeness = "reviewer"
  dependency   = "reviewer"
  feasibility  = "reviewer"

[role_bindings.plan_parser]
role = "plan_parser"

# ─── Run ──────────────────────────────────────────────────────────
[run]
default_template   = "standard"
global_timeout     = "2h"
auto_infer_template = true
max_total_retries  = 5

# ─── Scheduler ───────────────────────────────────────────────────
[scheduler]
max_global_agents = 3
max_project_runs  = 2

  [scheduler.watchdog]
  enabled         = true
  interval        = "5m"
  stuck_run_ttl   = "30m"
  stuck_merge_ttl = "15m"
  queue_stale_ttl = "60m"

# ─── V2 Engine ────────────────────────────────────────────────────
# v2 引擎的元数据抽取（Collector）默认关闭：需要提供 OpenAI 配置后才会启用。
[v2.collector]
max_retries = 2

  [v2.collector.openai]
  # 例如: "https://api.openai.com/v1"；留空则使用 SDK 默认值。
  base_url = "https://api.openai.com/v1"
  # 注意：不建议把密钥提交到版本库。
  api_key  = "xxxxxxxxxxxx"
  # 例如: "gpt-4o-mini"
  model    = "deepseek-v3.2"

# v2 ACP 进程沙箱隔离（每个进程独立 HOME/TMP/skills）。
# 默认关闭；开启后会影响 agent 的认证/缓存目录位置。
# provider:
#   - "home_dir": 仅做宿主机目录隔离
#   - "litebox":  通过 cmd/litebox-acp + LiteBox runner 包装 ACP 进程
#
# LiteBox 使用注意：
# 1. `bridge_command` 应指向已构建的 `litebox-acp` 可执行文件。
# 2. `runner_path` 应指向 LiteBox Windows runner，例如
#    `D:\\tmp\\litebox-research\\target\\release\\litebox_runner_linux_on_windows_userland.exe`
# 3. 被包装的 driver `launch_command` 必须是“LiteBox 可执行的 Linux 程序路径”，
#    不能直接是 Windows `npx.exe`。
[v2.sandbox]
enabled = false
provider = "home_dir"

  [v2.sandbox.litebox]
  bridge_command = "litebox-acp"
  bridge_args = []
  runner_path = ""
  runner_args = []

# 直接可用示例（按你的本地路径修改后，解开注释即可）：
#
# [v2.sandbox]
# enabled = true
# provider = "litebox"
#
#   [v2.sandbox.litebox]
#   bridge_command = "D:\\tmp\\litebox-acp.exe"
#   bridge_args = []
#   runner_path = "D:\\tmp\\litebox-research\\target\\release\\litebox_runner_linux_on_windows_userland.exe"
#   runner_args = ["--rootfs", "D:\\tmp\\litebox-rootfs"]
#
# [[v2.agents.drivers]]
# id              = "codex-linux-litebox"
# launch_command  = "D:\\tmp\\codex-acp-linux"
# launch_args     = []
# [v2.agents.drivers.capabilities_max]
# fs_read  = true
# fs_write = true
# terminal = true
#
# [[v2.agents.profiles]]
# id              = "worker-litebox"
# name            = "Worker (LiteBox Codex Linux)"
# driver          = "codex-linux-litebox"
# role            = "worker"
# capabilities    = ["dev.backend", "test"]
# actions_allowed = ["read_context", "search_files", "fs_write", "terminal", "submit"]
# prompt_template = "implement"
# skills          = ["executing-wave-plans"]
# [v2.agents.profiles.session]
# reuse     = false
# max_turns = 12
# idle_ttl  = "15m"

# v2 会话复用（session.reuse=true）时的“增量提示词”。
# 这些内容会作为同一 session 的后续消息发送，以复用已有上下文和 prompt cache，所以应尽量简短。
[v2.prompts]
rework_followup = """
# Rework Requested

上一轮提交未通过 gate，请根据反馈继续修改并在本地跑必要测试（不要只做 smoke）。

反馈：
{{.Feedback}}

请回复：你改了什么、怎么验证的、以及是否需要进一步协助。
"""

continue_followup = """
# Continue

请继续完成本 step（复用已有上下文，不要重复粘贴大段背景）：{{.StepName}}
"""

# ─── V2 Agent Drivers & Profiles ─────────────────────────────────
# Driver = 进程启动配置（共享二进制）
# Profile = 角色实例（绑定 driver + 能力 + 动作白名单）
#
# 如果 v2.agents 为空，v2 引擎会自动从 v1 的 agents.profiles + roles 推导。

