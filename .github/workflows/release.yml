name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "true"
  GOFLAGS: -buildvcs=false

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend bundle
        working-directory: web
        run: npm run build

      - name: Build packaged binary
        shell: bash
        run: |
          version="${GITHUB_REF_NAME:-snapshot}"
          asset_name="ai-flow_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          package_dir="dist/${asset_name}"
          binary_name="ai-flow"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi

          mkdir -p "${package_dir}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -tags webdist -trimpath -ldflags="-s -w" -o "${package_dir}/${binary_name}" ./cmd/ai-flow

          cp README.md "${package_dir}/"
          cp README.zh-CN.md "${package_dir}/"

      - name: Archive release package
        id: archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME:-snapshot}"
          asset_name="ai-flow_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          artifact_path="dist/${asset_name}.${{ matrix.archive }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (
              cd dist
              zip -r "${asset_name}.zip" "${asset_name}"
            )
          else
            tar -C dist -czf "${artifact_path}" "${asset_name}"
          fi
          if [ "${{ matrix.archive }}" = "zip" ]; then
            artifact_path="dist/${asset_name}.zip"
          fi
          echo "artifact_path=${artifact_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.archive.outputs.artifact_path }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
